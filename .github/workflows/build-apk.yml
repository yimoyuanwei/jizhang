name: 构建 APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 构建 APK（使用 Nitron）
        working-directory: money-apk
        run: |
          npm install
          npx nitron build

      - name: 上传 APK 为构建产物
        uses: actions/upload-artifact@v4
        with:
          name: 记账本-APK
          path: money-apk/dist/*.apk
